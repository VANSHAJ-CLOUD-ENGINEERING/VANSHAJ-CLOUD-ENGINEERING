# ═══════════════════════════════════════════════════════════
#  GitHub Metrics — Auto-generates github-metrics.svg daily
#  Displays: languages, activity, repos, contributions, etc.
#
#  SETUP REQUIRED:
#    1. Go to GitHub Settings → Developer Settings → Personal Access Tokens
#    2. Create a Fine-grained token with "repo" Read/Write access
#    3. Add it as a repository secret named: METRICS_TOKEN
#       (Settings → Secrets and variables → Actions → New secret)
# ═══════════════════════════════════════════════════════════

name: 📈 GitHub Metrics

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 2 AM UTC (7:30 AM IST)
  workflow_dispatch:        # Run manually from Actions tab
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📈 Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: VANSHAJ-CLOUD-ENGINEERING

          # Output
          filename: github-metrics.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "📈 Update GitHub metrics [skip ci]"

          # Base sections
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: Asia/Kolkata
          config_display: large

          # Languages breakdown
          plugin_languages: yes
          plugin_languages_analysis_timeout: 20
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes
          plugin_languages_recent_days: 30

          # Recent activity
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_visibility: public

          # Stars
          plugin_stars: yes
          plugin_stars_limit: 3

          # Repository traffic
          plugin_traffic: yes
